services:
  monitor-system:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/urbaniakmichal/monitor-system:latest
    container_name: monitor-system
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3