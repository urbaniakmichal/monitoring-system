services:
  monitor-system:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/urbaniakmichal/monitor-system:latest
    container_name: monitor-system
    ports:
      - "${HOST_PORT:-8080}:${PORT:-8080}"
    restart: unless-stopped
    environment:
      - PORT=${PORT:-8080}
    
    deploy:
      resources:
        limits:
          cpus: '0.25'      # Max 25% 1 CPU
          memory: 64M       # Max 64 MB RAM
        reservations:
          cpus: '0.05'
          memory: 16M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-8080}/health"]
      interval: 10s
      timeout: 3s
      retries: 3